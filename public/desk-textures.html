<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>桌面纹理诊断 - Papyrus</title>
<style>
  body { margin: 0; background: #1a1a1a; color: #eee; font-family: sans-serif; padding: 20px; }
  h1 { font-size: 18px; }
  .grid { display: grid; grid-template-columns: repeat(3, 220px); gap: 16px; }
  .cell { background: #2a2a2a; padding: 8px; border-radius: 6px; }
  .cell canvas { display: block; width: 200px; height: 200px; image-rendering: pixelated; background: #000; }
  .label { margin-top: 6px; font-size: 13px; text-align: center; }
  .stat { font-size: 11px; color: #999; text-align: center; }
</style>
</head>
<body>
<h1>桌面纹理生成诊断（独立于 Three.js / R3F）</h1>
<p>下方每个方块是用与 <code>useDeskTexture.js</code> 完全相同的生成代码绘制的。若某块是纯色，则 bug 在生成代码；若全部都有纹理，则 bug 在渲染/部署。</p>
<div class="grid" id="grid"></div>

<script>
/* === 复制自 useDeskTexture.js（纯函数，无 React/THREE 依赖） === */
function hash(x, y) {
  const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453
  return n - Math.floor(n)
}
function smoothNoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y)
  const fx = x - ix, fy = y - iy
  const a = hash(ix, iy), b = hash(ix + 1, iy)
  const c = hash(ix, iy + 1), d = hash(ix + 1, iy + 1)
  const u = fx * fx * (3 - 2 * fx), v = fy * fy * (3 - 2 * fy)
  return a * (1 - u) * (1 - v) + b * u * (1 - v) + c * (1 - u) * v + d * u * v
}
function fbm(x, y, octaves = 4) {
  let value = 0, amp = 0.5, freq = 1
  for (let i = 0; i < octaves; i++) { value += amp * smoothNoise(x * freq, y * freq); amp *= 0.5; freq *= 2 }
  return value
}
function turbulence(x, y, octaves = 4) {
  let value = 0, amp = 0.5, freq = 1
  for (let i = 0; i < octaves; i++) { value += amp * Math.abs(smoothNoise(x * freq, y * freq) * 2 - 1); amp *= 0.5; freq *= 2 }
  return value
}
const woodPresets = {
  oak: { light: [196,158,110], dark: [120,88,52], ringDensity: 9, ringContrast: 0.5, grainStrength: 0.3, warpScale: 0.4 },
  walnut: { light: [128,78,46], dark: [56,32,18], ringDensity: 12, ringContrast: 0.65, grainStrength: 0.4, warpScale: 0.5 },
  cherry: { light: [176,96,62], dark: [96,46,26], ringDensity: 11, ringContrast: 0.45, grainStrength: 0.25, warpScale: 0.35 },
  mahogany: { light: [132,58,34], dark: [54,22,12], ringDensity: 14, ringContrast: 0.55, grainStrength: 0.5, warpScale: 0.45 },
}
function generateWoodTexture(ctx, res, presetName, tint) {
  const p = woodPresets[presetName] || woodPresets.oak
  const light = p.light.map((v, i) => v * (tint ? tint[i] : 1))
  const dark = p.dark.map((v, i) => v * (tint ? tint[i] : 1))
  const cx = res * (0.5 + (smoothNoise(13.7, 5.2) - 0.5) * 0.3)
  const cy = res * (0.5 + (smoothNoise(7.3, 21.1) - 0.5) * 0.3)
  const img = ctx.createImageData(res, res); const data = img.data
  for (let y = 0; y < res; y++) for (let x = 0; x < res; x++) {
    const dx = x - cx, dy = y - cy, dist = Math.sqrt(dx*dx + dy*dy)
    const angle = Math.atan2(dy, dx)
    const warp = fbm(Math.cos(angle)*2, dist*0.02, 3) * p.warpScale
    const ringDist = (dist/res)*p.ringDensity*20 + warp*15
    const ringFrac = ringDist - Math.floor(ringDist)
    const ringEdge = Math.pow(1 - Math.min(1, ringFrac*3), 2)
    const ringDark = ringEdge * p.ringContrast
    const grain = fbm(angle*1.5+3, dist*0.06, 3) * p.grainStrength
    const fineNoise = turbulence(x*0.05, y*0.05, 4) * 0.15
    const t = Math.min(1, Math.max(0, 1 - ringDark - grain*0.3 - fineNoise*0.2))
    const r = light[0]*t + dark[0]*(1-t), g = light[1]*t + dark[1]*(1-t), b = light[2]*t + dark[2]*(1-t)
    const idx = (y*res + x)*4
    data[idx]=Math.max(0,Math.min(255,r)); data[idx+1]=Math.max(0,Math.min(255,g)); data[idx+2]=Math.max(0,Math.min(255,b)); data[idx+3]=255
  }
  ctx.putImageData(img, 0, 0)
  const knotCount = 2 + Math.floor(smoothNoise(42, 17) * 2)
  for (let k = 0; k < knotCount; k++) {
    const ka = smoothNoise(k*9.3, k*3.1) * Math.PI * 2
    const kr = (0.2 + smoothNoise(k*2.1, k*7.7) * 0.25) * res
    const kx = cx + Math.cos(ka)*kr, ky = cy + Math.sin(ka)*kr
    const krx = 6 + smoothNoise(k*5, k)*6, kry = krx*0.7
    for (let ring = 0; ring < 5; ring++) {
      const rr = (ring+1)*1.8
      ctx.globalAlpha = 0.18 - ring*0.03
      ctx.strokeStyle = `rgb(${dark[0]},${dark[1]},${dark[2]})`
      ctx.lineWidth = 0.6; ctx.beginPath()
      ctx.ellipse(kx, ky, krx+rr, kry+rr, ka, 0, Math.PI*2); ctx.stroke()
    }
    const grad = ctx.createRadialGradient(kx, ky, 0, kx, ky, krx)
    grad.addColorStop(0, `rgba(${dark[0]*0.4},${dark[1]*0.4},${dark[2]*0.4},0.7)`)
    grad.addColorStop(1, `rgba(${dark[0]},${dark[1]},${dark[2]},0)`)
    ctx.globalAlpha = 1; ctx.fillStyle = grad
    ctx.beginPath(); ctx.ellipse(kx, ky, krx, kry, ka, 0, Math.PI*2); ctx.fill()
  }
  ctx.globalAlpha = 1
  const vignette = ctx.createRadialGradient(res/2, res/2, res*0.35, res/2, res/2, res*0.72)
  vignette.addColorStop(0, 'rgba(0,0,0,0)'); vignette.addColorStop(1, 'rgba(0,0,0,0.32)')
  ctx.fillStyle = vignette; ctx.fillRect(0, 0, res, res)
}
function generateMarbleTexture(ctx, res, tint) {
  const base = tint || [220,215,205], vein = [70,65,60]
  const img = ctx.createImageData(res, res); const data = img.data
  for (let y = 0; y < res; y++) for (let x = 0; x < res; x++) {
    const u = x/res, v = y/res
    const t = turbulence(u*4, v*4, 6)
    const veinVal = Math.pow(Math.abs(Math.sin((u*8 + t*3)*Math.PI)), 0.3)
    const mask = Math.pow(1 - veinVal, 4)
    const fine = fbm(u*30, v*30, 2) * 0.08
    const r = base[0]*(1-mask*0.8) + vein[0]*mask*0.8 - fine*30
    const g = base[1]*(1-mask*0.8) + vein[1]*mask*0.8 - fine*30
    const b = base[2]*(1-mask*0.8) + vein[2]*mask*0.8 - fine*30
    const idx = (y*res + x)*4
    data[idx]=Math.max(0,Math.min(255,r)); data[idx+1]=Math.max(0,Math.min(255,g)); data[idx+2]=Math.max(0,Math.min(255,b)); data[idx+3]=255
  }
  ctx.putImageData(img, 0, 0)
  const vignette = ctx.createRadialGradient(res/2, res/2, res*0.3, res/2, res/2, res*0.7)
  vignette.addColorStop(0, 'rgba(0,0,0,0)'); vignette.addColorStop(1, 'rgba(0,0,0,0.35)')
  ctx.fillStyle = vignette; ctx.fillRect(0, 0, res, res)
}
function generateLeatherTexture(ctx, res, tint) {
  const base = tint || [58,42,32]
  const img = ctx.createImageData(res, res); const data = img.data
  for (let y = 0; y < res; y++) for (let x = 0; x < res; x++) {
    const u = x/res, v = y/res
    const grain = turbulence(u*40, v*40, 5) * 0.4
    const wrinkles = fbm(u*6, v*6, 3) * 0.3
    const pores = smoothNoise(x*0.8, y*0.8) > 0.85 ? 0.25 : 0
    const dark = grain*0.5 + wrinkles*0.3 + pores*0.4
    const r = base[0]*(1-dark), g = base[1]*(1-dark), b = base[2]*(1-dark)
    const idx = (y*res + x)*4
    data[idx]=Math.max(0,Math.min(255,r)); data[idx+1]=Math.max(0,Math.min(255,g)); data[idx+2]=Math.max(0,Math.min(255,b)); data[idx+3]=255
  }
  ctx.putImageData(img, 0, 0)
  const vignette = ctx.createRadialGradient(res/2, res/2, res*0.3, res/2, res/2, res*0.7)
  vignette.addColorStop(0, 'rgba(0,0,0,0)'); vignette.addColorStop(1, 'rgba(0,0,0,0.4)')
  ctx.fillStyle = vignette; ctx.fillRect(0, 0, res, res)
}
function generateConcreteTexture(ctx, res, tint) {
  const base = tint || [180,178,172]
  const img = ctx.createImageData(res, res); const data = img.data
  for (let y = 0; y < res; y++) for (let x = 0; x < res; x++) {
    const u = x/res, v = y/res
    const n = fbm(u*8, v*8, 5) * 0.3
    const fine = turbulence(u*50, v*50, 3) * 0.15
    const dark = n + fine*0.3
    const r = base[0]*(1-dark), g = base[1]*(1-dark), b = base[2]*(1-dark)
    const idx = (y*res + x)*4
    data[idx]=Math.max(0,Math.min(255,r)); data[idx+1]=Math.max(0,Math.min(255,g)); data[idx+2]=Math.max(0,Math.min(255,b)); data[idx+3]=255
  }
  ctx.putImageData(img, 0, 0)
  for (let i = 0; i < 4; i++) {
    let px = Math.random()*res, py = Math.random()*res
    ctx.globalAlpha = 0.15; ctx.strokeStyle = '#333'; ctx.lineWidth = 0.6
    ctx.beginPath(); ctx.moveTo(px, py)
    for (let s = 0; s < 20; s++) { px += (Math.random()-0.5)*30; py += (Math.random()-0.5)*30; ctx.lineTo(px, py) }
    ctx.stroke()
  }
  ctx.globalAlpha = 1
  const vignette = ctx.createRadialGradient(res/2, res/2, res*0.3, res/2, res/2, res*0.7)
  vignette.addColorStop(0, 'rgba(0,0,0,0)'); vignette.addColorStop(1, 'rgba(0,0,0,0.3)')
  ctx.fillStyle = vignette; ctx.fillRect(0, 0, res, res)
}
function generateBrushedMetalTexture(ctx, res, tint) {
  const base = tint || [165,168,170]
  const img = ctx.createImageData(res, res); const data = img.data
  for (let y = 0; y < res; y++) for (let x = 0; x < res; x++) {
    const u = x/res, v = y/res
    const brush = turbulence(u*2, v*80, 4) * 0.35
    const fine = turbulence(u*5, v*200, 3) * 0.15
    const variation = fbm(u*4, v*4, 2) * 0.1
    const shade = 1 - brush*0.5 - fine*0.3 + variation*0.3
    const r = base[0]*shade, g = base[1]*shade, b = base[2]*shade
    const idx = (y*res + x)*4
    data[idx]=Math.max(0,Math.min(255,r)); data[idx+1]=Math.max(0,Math.min(255,g)); data[idx+2]=Math.max(0,Math.min(255,b)); data[idx+3]=255
  }
  ctx.putImageData(img, 0, 0)
}
function generateDarkMatteTexture(ctx, res, tint) {
  const base = tint || [38,36,34]
  const img = ctx.createImageData(res, res); const data = img.data
  for (let y = 0; y < res; y++) for (let x = 0; x < res; x++) {
    const u = x/res, v = y/res
    const n = fbm(u*10, v*10, 4) * 0.2
    const fine = turbulence(u*35, v*35, 2) * 0.1
    const dark = n + fine*0.3
    const r = base[0]*(1-dark), g = base[1]*(1-dark), b = base[2]*(1-dark)
    const idx = (y*res + x)*4
    data[idx]=Math.max(0,Math.min(255,r)); data[idx+1]=Math.max(0,Math.min(255,g)); data[idx+2]=Math.max(0,Math.min(255,b)); data[idx+3]=255
  }
  ctx.putImageData(img, 0, 0)
  const vignette = ctx.createRadialGradient(res/2, res/2, res*0.25, res/2, res/2, res*0.7)
  vignette.addColorStop(0, 'rgba(0,0,0,0)'); vignette.addColorStop(1, 'rgba(0,0,0,0.5)')
  ctx.fillStyle = vignette; ctx.fillRect(0, 0, res, res)
}

/* === 渲染所有材质并统计颜色方差 === */
const RES = 256
const materials = [
  ['oak', '橡木', (c,r)=>generateWoodTexture(c,r,'oak',null)],
  ['walnut', '胡桃木', (c,r)=>generateWoodTexture(c,r,'walnut',null)],
  ['cherry', '樱桃木', (c,r)=>generateWoodTexture(c,r,'cherry',null)],
  ['mahogany', '红木', (c,r)=>generateWoodTexture(c,r,'mahogany',null)],
  ['marble', '大理石', (c,r)=>generateMarbleTexture(c,r,null)],
  ['leather', '皮革', (c,r)=>generateLeatherTexture(c,r,null)],
  ['concrete', '混凝土', (c,r)=>generateConcreteTexture(c,r,null)],
  ['metal', '拉丝金属', (c,r)=>generateBrushedMetalTexture(c,r,null)],
  ['dark', '深色哑光', (c,r)=>generateDarkMatteTexture(c,r,null)],
]
const grid = document.getElementById('grid')
materials.forEach(([key, label, gen]) => {
  const cell = document.createElement('div'); cell.className = 'cell'
  const canvas = document.createElement('canvas'); canvas.width = RES; canvas.height = RES
  const ctx = canvas.getContext('2d')
  gen(ctx, RES)
  // 统计颜色方差（判断是否有纹理）
  const sample = ctx.getImageData(0, 0, RES, RES).data
  let sum = 0, sumSq = 0, n = 0
  for (let i = 0; i < sample.length; i += 16) {
    const lum = (sample[i] + sample[i+1] + sample[i+2]) / 3
    sum += lum; sumSq += lum*lum; n++
  }
  const mean = sum / n
  const variance = sumSq / n - mean * mean
  const stddev = Math.sqrt(Math.max(0, variance))
  const lbl = document.createElement('div'); lbl.className = 'label'; lbl.textContent = label
  const stat = document.createElement('div'); stat.className = 'stat'
  stat.textContent = `均值=${mean.toFixed(1)} 标准差=${stddev.toFixed(1)} ${stddev < 1 ? '⚠️纯色' : '✓有纹理'}`
  cell.appendChild(canvas); cell.appendChild(lbl); cell.appendChild(stat)
  grid.appendChild(cell)
})
</script>
</body>
</html>
